<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>migrare — escape vendor lock-in</title>
    <meta
      name="description"
      content="Migrate your Lovable, Bolt, or Replit project to a clean, self-owned codebase. No lock-in. No subscriptions. Your code belongs to you."
    />
    <meta property="og:title" content="migrare — escape vendor lock-in" />
    <meta
      property="og:description"
      content="Open-source migration tool for vibe-coded apps. Detect lock-in signals, apply automated transforms, and take back your codebase."
    />
    <meta property="og:url" content="https://migrare.creadev.org" />
    <meta name="twitter:card" content="summary" />
    <script>
      (() => {
        const THEME_KEY = "theme";
        const LIGHT = "light";
        const DARK = "dark";

        try {
          const stored = localStorage.getItem(THEME_KEY);
          const hasManualTheme = stored === LIGHT || stored === DARK;
          const systemTheme = window.matchMedia("(prefers-color-scheme: light)").matches ? LIGHT : DARK;
          const resolvedTheme = hasManualTheme ? stored : systemTheme;

          document.documentElement.setAttribute("data-theme", resolvedTheme);
          document.documentElement.setAttribute("data-theme-source", hasManualTheme ? "manual" : "system");
          document.documentElement.style.colorScheme = resolvedTheme;
        } catch (_) {
          document.documentElement.setAttribute("data-theme", DARK);
          document.documentElement.setAttribute("data-theme-source", "fallback");
          document.documentElement.style.colorScheme = DARK;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
